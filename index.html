<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Special Pages</title>
  <style>
    :root {
      --ink: #080808;
      --white: #ffffff;
      --muted: #e4e4e4;
      --soft: #f2f2f2;
      --pixel-font: "Courier New", monospace;
      --korean-font: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 18px 18px, rgba(0,0,0,0.04) 1px, transparent 1px)
        0 0 / 28px 28px,
        #d7d7d7;
      color: var(--ink);
      font-family: var(--korean-font);
    }

    /* ── Header ── */
    header {
      display: grid;
      place-items: center;
      padding: 56px 24px 40px;
      text-align: center;
    }

    .site-label {
      display: inline-block;
      margin-bottom: 18px;
      padding: 6px 16px;
      border: 3px solid var(--ink);
      background: var(--ink);
      color: var(--white);
      font-family: var(--pixel-font);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      font-family: var(--pixel-font);
      font-size: clamp(36px, 8vw, 72px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.01em;
      text-transform: uppercase;
    }

    .header-sub {
      margin-top: 14px;
      color: #555;
      font-size: 15px;
      font-weight: 600;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* ── Card ── */
    .card {
      display: grid;
      grid-template-rows: auto 1fr auto;
      border: 3px solid var(--ink);
      border-radius: 16px;
      background: var(--white);
      box-shadow: 8px 8px 0 var(--ink);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.08s, box-shadow 0.08s;
    }

    .card:hover {
      transform: translate(-3px, -3px);
      box-shadow: 11px 11px 0 var(--ink);
    }

    .card:active {
      transform: translate(4px, 4px);
      box-shadow: 4px 4px 0 var(--ink);
    }

    .card-header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 3px solid var(--ink);
      background: var(--muted);
    }

    .card-tag {
      font-family: var(--pixel-font);
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .card-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid var(--ink);
      background: var(--ink);
    }

    .card-body {
      padding: 24px 20px 20px;
    }

    .card-emoji {
      font-size: 40px;
      line-height: 1;
      margin-bottom: 14px;
      display: block;
    }

    .card-title {
      font-family: var(--pixel-font);
      font-size: clamp(18px, 3vw, 22px);
      font-weight: 900;
      line-height: 1.15;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .card-desc {
      font-size: 14px;
      font-weight: 600;
      color: #444;
      line-height: 1.55;
      word-break: keep-all;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-top: 3px solid var(--ink);
      background: var(--soft);
    }

    .card-date {
      font-family: var(--pixel-font);
      font-size: 12px;
      font-weight: 900;
      color: #555;
    }

    .card-arrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: 2px solid var(--ink);
      background: var(--ink);
      color: var(--white);
      font-family: var(--pixel-font);
      font-size: 13px;
      font-weight: 900;
    }

    /* ── Coming Soon card ── */
    .card.soon {
      opacity: 0.55;
      pointer-events: none;
    }

    .card.soon .card-header {
      background: repeating-linear-gradient(
        -45deg,
        var(--muted) 0 8px,
        var(--soft) 8px 16px
      );
    }

    .card.soon .card-dot {
      background: transparent;
    }

    .soon-badge {
      display: inline-block;
      margin-top: 12px;
      padding: 4px 10px;
      border: 2px solid var(--ink);
      font-family: var(--pixel-font);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ── Footer ── */
    footer {
      padding: 28px 24px;
      text-align: center;
      border-top: 3px solid var(--ink);
      background: var(--white);
      font-family: var(--pixel-font);
      font-size: 13px;
      font-weight: 900;
      color: #666;
    }

    @media (max-width: 520px) {
      header { padding: 36px 16px 28px; }
      .grid  { padding: 0 14px 56px; gap: 16px; }
    }
  </style>
</head>
<body>

  <header>
    <span class="site-label">✦ Special Pages ✦</span>
    <h1>Event<br>Board</h1>
    <p class="header-sub">특별한 날을 위한 페이지 모음</p>
  </header>

  <main class="grid">

    <!-- ── 스승의 날 ── -->
    <a class="card" href="./teachers-day/">
      <div class="card-header">
        <span class="card-tag">Rolling Paper</span>
        <span class="card-dot"></span>
      </div>
      <div class="card-body">
        <span class="card-emoji">🍎</span>
        <p class="card-title">Teacher's<br>Day</p>
        <p class="card-desc">
          스승의 날을 맞아 감사한 마음을 담아 만든 롤링페이퍼입니다.
          크루원들의 따뜻한 메시지가 한 장에 담겨 있습니다.
        </p>
      </div>
      <div class="card-footer">
        <span class="card-date">2025.05.15</span>
        <span class="card-arrow">열기 →</span>
      </div>
    </a>

    <!-- ── 다음 이벤트 자리 ── -->
    <div class="card soon">
      <div class="card-header">
        <span class="card-tag">Coming Soon</span>
        <span class="card-dot"></span>
      </div>
      <div class="card-body">
        <span class="card-emoji">📅</span>
        <p class="card-title">Next<br>Event</p>
        <p class="card-desc">다음 특별한 날을 위한 페이지가 여기에 추가됩니다.</p>
        <span class="soon-badge">준비 중</span>
      </div>
      <div class="card-footer">
        <span class="card-date">TBD</span>
        <span class="card-arrow">준비 중</span>
      </div>
    </div>

  </main>

  <footer>
    SPECIAL PAGES — Made with ♥
  </footer>

</body>
</html>
